---
comment: |
  PerlOnJava distroprefs for AnyEvent.

  AnyEvent's upstream suite covers fork, local socket, SSL, signal, and live
  event-loop surfaces that are broader than the pure-Perl module load/install
  surface. PerlOnJava does not implement fork, and several watcher tests can
  hang after the fork-only child test fails.

  Suppress Canary::Stability's interactive Makefile.PL prompt, then build and
  install the module while skipping the upstream test phase. Downstream modules
  that depend on AnyEvent remain their own compatibility gates.
match:
  distribution: "^MLEHMANN/AnyEvent-"
pl:
  commandline: 'jperl -MPerlOnJava::Distroprefs::AnyEvent -e "PerlOnJava::Distroprefs::AnyEvent::pl_phase()"'
test:
  commandline: "PERLONJAVA_SKIP"
