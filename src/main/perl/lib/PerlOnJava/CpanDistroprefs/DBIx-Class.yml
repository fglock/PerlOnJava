---
comment: |
  PerlOnJava distroprefs for DBIx::Class.

  The full upstream DBIx::Class test matrix is too large for the
  `jcpan -t DBIx::Class` regression budget. Keep the test phase meaningful by
  running a focused smoke/leak/core subset that still exits nonzero on real
  failures and includes the DBIC leak test that caught PerlOnJava regressions.
match:
  distribution: "^RIBASUSHI/DBIx-Class-"
test:
  commandline: 'jperl -MPerlOnJava::Distroprefs::DBIxClass -e "PerlOnJava::Distroprefs::DBIxClass::test_phase()"'
