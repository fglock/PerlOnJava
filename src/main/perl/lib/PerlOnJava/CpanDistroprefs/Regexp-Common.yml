---
comment: |
  PerlOnJava distroprefs for Regexp::Common.

  AI::Prolog depends on Regexp::Common for common parser token patterns.
  Regexp::Common's full upstream suite exercises regex features that are
  still incomplete in PerlOnJava, including conditional regex constructs and
  some complex IPv6/comment/palindrome cases. The subset used by AI::Prolog
  can still be installed and validated by AI::Prolog's own tests.

  Keep the test output visible for signal, but allow CPAN to install it.
match:
  distribution: "^ABIGAIL/Regexp-Common-"
test:
  commandline: "PERLONJAVA_TEST_IGNORE_FAILURES"
