---
comment: |
  PerlOnJava distroprefs for libwww-perl.

  Some downstream distributions need libwww-perl only as a dependency
  (for example LWP::Online uses LWP::Simple, and HTTP::Response::Encoding's
  file test uses LWP::UserAgent). libwww-perl's upstream suite includes local
  HTTP daemon tests and live-network checks that are not stable prerequisites
  for those downstream tests. Skip the dependency test phase so CPAN can stage
  the LWP modules; downstream suites still run normally.

  Do not apply this dependency-only skip when libwww-perl itself is the
  requested jcpan target. The LWP suite is expected to run in that case.
match:
  distribution: "^OALDERS/libwww-perl-"
  env:
    not_PERLONJAVA_JCPAN_ARGS: "(^|[[:space:]])(?:LWP|LWP::UserAgent)($|[[:space:]])"
test:
  commandline: "PERLONJAVA_SKIP"
